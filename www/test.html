<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakra</title>

    <link rel="shortcut icon" href="assets/img/icon.ico" type="image/x-icon">

    <!-- Bootsrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Bootsrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
        type="text/javascript"></script>

    <!-- Texllate  -->
    <link rel="stylesheet" href="assets/vendore/texllate/animate.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="hand-sign-body">
                    <div class="hand-sign-video-wrap">
                        <video id="handSignVideo" class="hand-sign-video" playsinline autoplay muted></video>
                        <canvas id="handSignCanvas" class="hand-sign-canvas"></canvas>
                    </div>
                    <div class="hand-sign-panel">
                        <div class="hand-sign-status">
                            <div><strong>Status</strong>: <span id="handSignStatus">Idle</span></div>
                            <div><strong>Detected</strong>: <span id="handSignDetected">-</span></div>
                        </div>
                        <div class="hand-sign-actions">
                            <button id="handSignStartBtn" type="button">Start</button>
                            <button id="handSignStopBtn" type="button" disabled>Stop</button>
                            <button id="handSignClearBtn" type="button">Clear input</button>
                        </div>
                        <div class="hand-sign-help">
                            To recognize A–Z, set <code>window.ASL_MODEL_URL</code> to a TFJS model.json (see
                            <code>handSign.js</code>). Without a model, it will only show landmarks + a basic fallback.
                        </div>
                    </div>
                </div>
            </div>
        </div>

    


    <!--Jquery  -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Particle js -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js'></script>
    <script src="script.js"></script>

    <!-- Siri wave -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

    <!-- Texllate js -->
    <script src="assets/vendore/texllate/jquery.fittext.js"></script>
    <script src="assets/vendore/texllate/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <!-- lottie files -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <!-- TFJS + Handpose (auto-downloads its own model) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fingerpose@0.1.0/dist/fingerpose.min.js"></script>

    <script src="main.js"></script>
    <script src="controller.js"></script>
    <script src="aslFingerposeGestures.js"></script>
    <script src="handSign.js"></script>
    <script src="/eel.js"></script>


</body>
</html>
